services:
  - type: worker
    name: pay-me-back-agent
    env: node
    plan: starter
    region: oregon
    buildCommand: npm install --no-audit --no-fund
    startCommand: npm run agent:start
    autoDeploy: true
    envVars:
      - key: PRIVATE_KEY
        sync: false
      - key: LOAN_MANAGER_ADDRESS
        sync: false
      - key: UNISWAP_ROUTER_ADDRESS
        sync: false
      - key: COLLATERAL_TOKEN_ADDRESS
        sync: false
      - key: AGENT_POLL_INTERVAL_MS
        value: "10000"
